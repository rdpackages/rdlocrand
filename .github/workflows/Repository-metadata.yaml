on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "CONTRIBUTING.md"
      - "AGENTS.md"
      - "R/rdlocrand/DESCRIPTION"
      - "Python/rdlocrand/README.md"
      - "Python/rdlocrand/setup.cfg"
      - "stata/rdlocrand.pkg"
      - "stata/stata.toc"
      - "scripts/check-repo-metadata.py"
      - ".github/workflows/Repository-metadata.yaml"
  pull_request:
    paths:
      - "README.md"
      - "CONTRIBUTING.md"
      - "AGENTS.md"
      - "R/rdlocrand/DESCRIPTION"
      - "Python/rdlocrand/README.md"
      - "Python/rdlocrand/setup.cfg"
      - "stata/rdlocrand.pkg"
      - "stata/stata.toc"
      - "scripts/check-repo-metadata.py"
      - ".github/workflows/Repository-metadata.yaml"
  workflow_dispatch:

name: Repository metadata

permissions: read-all

jobs:
  metadata:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Check repository metadata
        run: python scripts/check-repo-metadata.py
