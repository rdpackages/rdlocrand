on:
  push:
    branches: [main]
    paths:
      - "stata/**"
      - "scripts/check-repo-metadata.py"
      - "scripts/check-stata-package.py"
      - ".github/workflows/Stata-package.yaml"
  pull_request:
    paths:
      - "stata/**"
      - "scripts/check-repo-metadata.py"
      - "scripts/check-stata-package.py"
      - ".github/workflows/Stata-package.yaml"
  workflow_dispatch:

name: Stata package

permissions: read-all

jobs:
  Stata-manifest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check repository metadata
        run: python scripts/check-repo-metadata.py

      - name: Validate Stata package manifest
        run: python scripts/check-stata-package.py --strict-unlisted
