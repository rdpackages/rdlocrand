on:
  push:
    branches: [main]
    paths:
      - "Python/rdlocrand/**"
      - "scripts/check-repo-metadata.py"
      - "scripts/check-python.py"
      - ".github/workflows/Python-package.yaml"
  pull_request:
    paths:
      - "Python/rdlocrand/**"
      - "scripts/check-repo-metadata.py"
      - "scripts/check-python.py"
      - ".github/workflows/Python-package.yaml"
  workflow_dispatch:

name: Python package

permissions: read-all

jobs:
  Python-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (Python ${{ matrix.config.python }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest, python: "3.10"}
          - {os: ubuntu-latest, python: "3.11"}
          - {os: ubuntu-latest, python: "3.12"}
          - {os: ubuntu-latest, python: "3.13"}
          - {os: ubuntu-latest, python: "3.14"}
          - {os: macos-latest, python: "3.14"}
          - {os: windows-latest, python: "3.14"}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.config.python }}
          cache: pip
          cache-dependency-path: Python/rdlocrand/setup.cfg

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m pip install -e Python/rdlocrand

      - name: Check repository metadata
        run: python scripts/check-repo-metadata.py

      - name: Run Python tests
        run: python scripts/check-python.py --tests --no-install

      - name: Build source and wheel distributions
        if: matrix.config.os == 'ubuntu-latest' && matrix.config.python == '3.14'
        run: python scripts/check-python.py --build --no-install

      - name: Check built distributions
        if: matrix.config.os == 'ubuntu-latest' && matrix.config.python == '3.14'
        run: python -m twine check Python/rdlocrand/dist/*
