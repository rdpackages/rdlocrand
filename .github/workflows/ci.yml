name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  repository:
    name: Repository checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check repository layout
        shell: bash
        run: |
          test -f README.md
          test -f LICENSE.md
          test -f R/rdlocrand/DESCRIPTION
          test -f Python/rdlocrand/pyproject.toml
          test -f Python/rdlocrand/setup.cfg
          test -f stata/stata.toc
          test -f stata/rdlocrand.pkg

  python-build:
    name: Python build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Install Python package
        working-directory: Python/rdlocrand
        run: python -m pip install -e .

      - name: Build Python package
        working-directory: Python/rdlocrand
        run: python -m build

  r-check:
    name: R CMD check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install R dependencies
        run: |
          repos <- c(RSPM = Sys.getenv("RSPM"), CRAN = "https://cloud.r-project.org")
          install.packages(c("AER", "sandwich"), repos = repos)
        shell: Rscript {0}

      - name: Build R source package
        run: R CMD build R/rdlocrand

      - name: Check R package
        run: R CMD check rdlocrand_*.tar.gz --no-manual
